<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #10b981; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; background: #f9fafb; border-radius: 0 0 10px 10px; }
        .amount { font-size: 28px; font-weight: bold; color: #10b981; text-align: center; margin: 20px 0; }
        .payment-details { background: white; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .button { display: inline-block; background: #2563EB; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 15px; }
        .footer { text-align: center; padding: 15px; font-size: 12px; color: #6b7280; border-top: 1px solid #e5e7eb; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Payment Confirmed!</h1>
    </div>
    <div class="content">
        <h2>Tracking #: <span th:text="${trackingNumber}">QP-XXXX</span></h2>

        <div class="amount" th:text="${amount}">₱0.00</div>

        <div class="payment-details">
            <p><strong>Payment Method:</strong> <span th:text="${paymentMethod}">COD/Stripe</span></p>
            <p><strong>Payment Status:</strong> <span th:text="${paymentStatus}">PAID</span></p>
            <p><strong>Your delivery will be assigned to a rider shortly.</strong></p>
        </div>

        <a th:href="${trackingUrl}" class="button">Track Your Delivery</a>
    </div>
    <div class="footer">
        <p>&copy; <span th:text="${year}">2026</span> QuickParcel. All rights reserved.</p>
    </div>
</div>
</body>
</html>
