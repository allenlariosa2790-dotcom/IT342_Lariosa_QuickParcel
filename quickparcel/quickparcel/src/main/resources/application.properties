# ======================================================
# QUICKPARCEL - SPRING BOOT CONFIGURATION
# Version: 0.1
# Last Updated: March 7, 2026
# ======================================================

# ======================================================
# ACTIVE PROFILE (CHANGE THIS BASED ON ENVIRONMENT)
# ======================================================
# home - for MySQL Workbench (password: 123456)
# lab  - for XAMPP (blank password)
spring.profiles.active=home

# ======================================================
# SERVER CONFIGURATION
# ======================================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ======================================================
# DATABASE CONFIGURATION - SHARED SETTINGS
# ======================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ======================================================
# LAB PROFILE - XAMPP (lab PC)
# ======================================================
spring.datasource.url=jdbc:mysql://localhost:3306/quickparcel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ======================================================
# JPA / HIBERNATE CONFIGURATION
# ======================================================
# DDL auto (create, update, validate, none)
# create: drops and recreates tables (use only for testing)
# update: updates schema without deleting data (best for development)
# validate: validates schema, doesn't make changes
# none: no automatic schema management
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL dialect for MySQL (will be auto-detected, but specified for clarity)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Batch processing for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ======================================================
# JWT CONFIGURATION
# ======================================================
# Secret key for signing JWT tokens (change this to a secure random string)
# Use a long random string in production - minimum 32 characters recommended
jwt.secret=mySecretKeyForQuickParcel2026ChangeThisInProductionMakeItLongerAndMoreSecure
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ======================================================
# OpenRouteService API
# ======================================================
ors.api.key=eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImUxODgwODU3NTVmNDQ2ZDY4MmEwMTQ5MGNkMmE1MDRkIiwiaCI6Im11cm11cjY0In0=
