# ======================================================
# FILE UPLOAD CONFIGURATION
# ======================================================
# Max file size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File upload location (create this folder)
file.upload-dir=./uploads

# ======================================================
# LOGGING CONFIGURATION
# ======================================================
# Spring Framework logging
logging.level.org.springframework=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Application logging
logging.level.edu.cit.lariosa.quickparcel=DEBUG

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE

# JPA logging
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Root logging
logging.level.root=WARN

# Log file (optional - uncomment to enable file logging)
# logging.file.name=logs/quickparcel.log
# logging.file.max-size=10MB
# logging.file.max-history=7

# ======================================================
# CORS CONFIGURATION (for React frontend and Mobile)
# ======================================================
# Allow requests from React dev server and Android emulator
cors.allowed-origins=http://localhost:3000,http://10.0.2.2,http://10.0.2.2:8080,http://127.0.0.1:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ======================================================
# EMAIL CONFIGURATION (for notifications)
# ======================================================
# Gmail SMTP (example - configure with your credentials)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ======================================================
# MANAGEMENT ENDPOINTS (optional)
# ======================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ======================================================
# INTERNATIONALIZATION (optional)
# ======================================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ======================================================
# THYMELEAF
# ======================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ======================================================
# APPLICATION SPECIFIC PROPERTIES
# ======================================================
app.name=QuickParcel
app.version=0.3
app.description=On-Demand Logistics Platform